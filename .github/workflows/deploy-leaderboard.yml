name: Deploy Leaderboard

# Deploys the server/ Worker to Cloudflare. Runs when server/ changes on
# main, or on demand from the Actions tab.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   - dash.cloudflare.com/profile/api-tokens,
#                            "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID  - dashboard sidebar (recommended; optional for
#                            single-account tokens)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['server/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN repo secret. Create one at dash.cloudflare.com/profile/api-tokens (template: 'Edit Cloudflare Workers') and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      # Creates the SCORES KV namespace on first run and injects its id into
      # wrangler.toml; later runs find the existing namespace by title.
      - name: Ensure KV namespace
        run: |
          set -euo pipefail
          if ! grep -q REPLACE_WITH_KV_NAMESPACE_ID wrangler.toml; then
            echo "wrangler.toml already has a namespace id; skipping."
            exit 0
          fi
          ID=$(npx wrangler kv namespace list 2>/dev/null \
            | jq -r '.[] | select(.title == "niko-leaderboard-SCORES") | .id' || true)
          if [ -z "$ID" ]; then
            echo "Creating KV namespace…"
            OUT=$(npx wrangler kv namespace create SCORES 2>&1)
            echo "$OUT"
            ID=$(echo "$OUT" | grep -oE '[0-9a-f]{32}' | head -1)
          fi
          if [ -z "$ID" ]; then
            echo "::error::Could not determine KV namespace id"
            exit 1
          fi
          sed -i "s/REPLACE_WITH_KV_NAMESPACE_ID/$ID/" wrangler.toml
          echo "Using KV namespace $ID"

      - name: Deploy Worker
        run: |
          set -euo pipefail
          npx wrangler deploy 2>&1 | tee deploy.log
          URL=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' deploy.log | head -1 || true)
          {
            echo "## Leaderboard deployed 🐾"
            if [ -n "$URL" ]; then
              echo ""
              echo "**Worker URL:** $URL"
              echo ""
              echo "Next: set \`leaderboardApiUrl\` in \`src/data/features.ts\` to this URL."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
